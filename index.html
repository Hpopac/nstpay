<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invoice System</title>

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#f3f4f6;
    font-family:Arial,Helvetica,sans-serif;
    padding:20px;
}

.container{
    width:100%;
    max-width:480px;
    background:white;
    border-radius:16px;
    padding:24px;
    box-shadow:0 10px 25px rgba(0,0,0,.08);
}

h2{
    margin-top:0;
    text-align:center;
}

input{
    width:100%;
    padding:12px;
    margin-bottom:12px;
    border:1px solid #ddd;
    border-radius:8px;
    font-size:15px;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:15px;
}

.primary{
    background:#2563eb;
    color:white;
}

.primary:hover{
    background:#1d4ed8;
}

.secondary{
    background:#16a34a;
    color:white;
}

.secondary:hover{
    background:#15803d;
}

#result{
    display:none;
    margin-top:16px;
    padding:14px;
    border-radius:8px;
    background:#f8fafc;
    border:1px solid #e5e7eb;
    white-space:pre-line;
    word-break:break-word;
}

#copyBtn{
    display:none;
    margin-top:12px;
}

#mainBox{
    display:none;
}

#status{
    margin-top:10px;
    text-align:center;
    font-size:14px;
    color:#666;
}

#log{
    display:none;
}

</style>
</head>

<body>

<div class="container">

    <h2>Invoice System</h2>

    <div id="loginBox">

        <input
            id="username"
            type="text"
            placeholder="Username">

        <input
            id="token"
            type="password"
            placeholder="Token">

        <button
            class="primary"
            onclick="login()">
            Login
        </button>

    </div>

    <div id="mainBox">

        <input
            id="amount"
            type="number"
            min="1"
            placeholder="Amount">

        <button
            id="genBtn"
            class="primary"
            onclick="generate()">
            Generate Receipt
        </button>

        <div id="result"></div>

        <button
            id="copyBtn"
            class="secondary"
            onclick="copyResult()">
            Copy Payment Info
        </button>

    </div>

    <div id="status"></div>

    <div id="log"></div>

</div>

<script>

const API_URL =
"https://script.google.com/macros/s/AKfycbyk4CHTgtY0ReIDSMj3F687ki7E8uJcuMdkC-Ia2SqgbRRsGAO2HeFrlAIxxhlAGOQ/exec";

function log(msg){

    console.log(msg);

    const logDiv =
        document.getElementById("log");

    logDiv.innerText += msg + "\n";
}

function setStatus(text){

    document.getElementById("status")
        .innerText = text;
}

window.onerror = function(msg,url,line){

    log(
        "JS ERROR: " +
        msg +
        " line:" +
        line
    );

};

window.onload = function(){

    const username =
        localStorage.getItem("username");

    const token =
        localStorage.getItem("token");

    const uid =
        localStorage.getItem("uid");

    if(
        username &&
        token &&
        uid
    ){

        document
            .getElementById("loginBox")
            .style.display = "none";

        document
            .getElementById("mainBox")
            .style.display = "block";

        setStatus(
            "Logged in as " +
            username
        );

    }

};

async function login(){

    try{

        const username =
            document
                .getElementById("username")
                .value
                .trim();

        const token =
            document
                .getElementById("token")
                .value
                .trim();

        if(!username || !token){

            setStatus(
                "Username and token required"
            );

            return;
        }

        setStatus(
            "Checking account..."
        );

        const res =
            await fetch(
                API_URL,
                {
                    method:"POST",
                    body:JSON.stringify({
                        action:"auth",
                        username:username,
                        token:token
                    })
                }
            );

        const text =
            await res.text();

        log(text);

        const data =
            JSON.parse(text);

        if(!data.found){

            setStatus(
                "Invalid username or token"
            );

            return;
        }

        localStorage.setItem(
            "username",
            username
        );

        localStorage.setItem(
            "token",
            token
        );

        localStorage.setItem(
            "uid",
            data.id
        );

        location.reload();

    }
    catch(ex){

        console.error(ex);

        setStatus(
            "Connection error"
        );
    }

}

async function generate(){

    try{

        const amount =
            Number(
                document
                    .getElementById("amount")
                    .value
            );

        if(!amount){

            setStatus(
                "Enter amount"
            );

            return;
        }

        setStatus(
            "Generating receipt..."
        );

        const response =
            await fetch(
                API_URL,
                {
                    method:"POST",
                    body:JSON.stringify({

                        action:"receipt",

                        username:
                            localStorage.getItem("username"),

                        token:
                            localStorage.getItem("token"),

                        uid:
                            localStorage.getItem("uid"),

                        amount:
                            amount
                    })
                }
            );

        const text =
            await response.text();

        log(text);

        const data =
            JSON.parse(text);

        if(data.error){

            localStorage.clear();

            setStatus(
                "Session expired"
            );

            location.reload();

            return;
        }

        const paymentText =
`IBAN: ${data.iban}

Receipt: ${data.receiptId}

Company: ${data.name}

Note: ${data.note}`;

        document
            .getElementById("result")
            .innerText =
            paymentText;

        document
            .getElementById("result")
            .style.display =
            "block";

        document
            .getElementById("genBtn")
            .style.display =
            "none";

        document
            .getElementById("copyBtn")
            .style.display =
            "block";

        window.paymentText =
            paymentText;

        setStatus(
            "Receipt generated successfully"
        );

    }
    catch(ex){

        console.error(ex);

        setStatus(
            "Failed to generate receipt"
        );
    }

}

async function copyResult(){

    try{

        await navigator
            .clipboard
            .writeText(
                window.paymentText
            );

        setStatus(
            "Copied"
        );

        setTimeout(
            ()=>{
                location.reload();
            },
            500
        );

    }
    catch(ex){

        console.error(ex);

        setStatus(
            "Copy failed"
        );
    }

}

</script>

</body>
</html>
