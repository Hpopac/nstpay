<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Debug Invoice System</title>

<style>
body { font-family: Arial; padding: 20px; }
input, button { padding: 10px; margin: 6px; width: 280px; }
#result { white-space: pre-line; margin-top: 20px; padding:10px; background:#f4f4f4; }
#log { white-space: pre-line; margin-top: 20px; padding:10px; background:#111; color:#0f0; height:200px; overflow:auto; }
</style>
</head>

<body>

<h2>Invoice System (Debug Mode)</h2>

<div id="loginBox">
  <input id="username" placeholder="Username"><br>
  <input id="token" placeholder="Token"><br>
  <button onclick="login()">Login</button>
</div>

<div id="mainBox" style="display:none">

  <input id="amount" placeholder="Amount"><br>
  <button id="genBtn" onclick="generate()">Generate</button>

  <div id="result"></div>
  <button id="copyBtn" style="display:none" onclick="copy()">Copy</button>

</div>

<div id="log"></div>

<script>

const API_URL =
"https://script.google.com/macros/s/AKfycbzFMMCyTYGQ6Chwuo56jM96JFHRBAD7YT6DLMVhdhpsHdvwMvrdfOtoBbQQLFaUjsk/exec";

function log(msg) {
  console.log(msg);
  document.getElementById("log").innerText += msg + "\n";
}

window.onerror = function(msg, url, line) {
  log("JS ERROR: " + msg + " | line: " + line);
};

window.onload = function() {
  log("Page loaded");

  const u = localStorage.getItem("username");
  const t = localStorage.getItem("token");
  const id = localStorage.getItem("uid");

  log("Stored user: " + u + " | token: " + t + " | uid: " + id);

  if (u && t && id) {
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("mainBox").style.display = "block";
    log("Auto login success");
  }
};

async function login() {

  try {

    const username = document.getElementById("username").value;
    const token = document.getElementById("token").value;

    log("LOGIN attempt: " + username);

    const res = await fetch(API_URL, {
      method: "POST",
      body: JSON.stringify({
        action: "auth",
        username,
        token
      })
    });

    log("Auth response status: " + res.status);

    const text = await res.text();
    log("Auth raw response: " + text);

    const data = JSON.parse(text);

    if (!data.found) {
      log("LOGIN FAILED");
      alert("Invalid login");
      return;
    }

    localStorage.setItem("username", username);
    localStorage.setItem("token", token);
    localStorage.setItem("uid", data.id);

    log("LOGIN SUCCESS uid=" + data.id);

    location.reload();

  } catch (e) {
    log("LOGIN ERROR: " + e.message);
  }
}

async function generate() {

  try {

    const username = localStorage.getItem("username");
    const token = localStorage.getItem("token");
    const uid = localStorage.getItem("uid");
    const amount = Number(document.getElementById("amount").value);

    log("Generate request: " + amount);

    if (!amount) {
      log("ERROR: invalid amount");
      return;
    }

    const res = await fetch(API_URL, {
      method: "POST",
      body: JSON.stringify({
        action: "receipt",
        username,
        token,
        uid,
        amount
      })
    });

    log("Receipt response status: " + res.status);

    const text = await res.text();
    log("Raw receipt response: " + text);

    const data = JSON.parse(text);

    if (data.error) {
      log("SERVER ERROR: " + data.error);
      alert("Session invalid");
      localStorage.clear();
      location.reload();
      return;
    }

    const final =
`IBAN: ${data.iban}
Receipt: ${data.receiptId}
Company: ${data.name}
Note: ${data.note}`;

    document.getElementById("result").innerText = final;

    document.getElementById("genBtn").style.display = "none";
    document.getElementById("copyBtn").style.display = "block";

    window.finalText = final;

    log("RECEIPT GENERATED SUCCESS");

  } catch (e) {
    log("GENERATE ERROR: " + e.message);
  }
}

function copy() {
  navigator.clipboard.writeText(window.finalText);
  log("Copied to clipboard");
  location.reload();
}

</script>

</body>
</html>
